# Railway Nixpacks Configuration for Stitch Smart Python FastAPI Chatbot
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["python -m venv --copy /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
