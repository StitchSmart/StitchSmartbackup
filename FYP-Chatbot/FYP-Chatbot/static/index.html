<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --accent: #6c63ff;
            --accent-hover: #5a52d5;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --border: #2a2a40;
            --user-bubble: linear-gradient(135deg, #6c63ff, #4834d4);
            --bot-bubble: #1e1e36;
            --success: #2ed573;
            --danger: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(72, 52, 212, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(46, 213, 115, 0.04) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgShift {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(-5%, 3%) rotate(1deg);
            }

            66% {
                transform: translate(3%, -2%) rotate(-1deg);
            }
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 20px 24px;
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: var(--user-bubble);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .header-info h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeSlideIn 0.3s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.bot .message-avatar {
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        .message.user .message-avatar {
            background: var(--user-bubble);
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.55;
            font-size: 14px;
            position: relative;
            white-space: pre-wrap;
        }

        .message.bot .message-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-area {
            padding: 16px 24px 24px;
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            padding: 8px 0;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: var(--user-bubble);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .welcome-card {
            text-align: center;
            padding: 40px 24px;
            animation: fadeSlideIn 0.5s ease-out;
        }

        .welcome-card .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto 24px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestion-chip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-icon">&#128722;</div>
            <div class="header-info">
                <h1>Store Assistant</h1>
                <p><span class="status-dot"></span>Online &#8212; Ask me about our products</p>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-card">
                <div class="welcome-icon">&#129302;</div>
                <h2>Welcome to our Store!</h2>
                <p>I'm your AI shopping assistant. Ask me about products, pricing, features, discounts, and more.</p>
                <div class="suggestions">
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">What products do you have?</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">Show me headphones</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">Any discounts available?</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">What's your return policy?</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask about our products..." autocomplete="off"
                    onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isStreaming = false;

        // Generate a random session ID for history tracking
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
        console.log("Chat session started:", sessionId);

        function sendSuggestion(el) {
            if (isStreaming) return;
            userInput.value = el.textContent;
            sendMessage();
        }

        function addMessage(content, type) {
            const welcome = messagesContainer.querySelector('.welcome-card');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = 'message ' + type;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'user' ? '\uD83D\uDC64' : '\uD83E\uDD16';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            messagesContainer.appendChild(msg);
            scrollToBottom();
            return bubble;
        }

        function addTypingIndicator() {
            const welcome = messagesContainer.querySelector('.welcome-card');
            if (welcome) welcome.remove();

            const msg = document.createElement('div');
            msg.className = 'message bot';
            msg.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '\uD83E\uDD16';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            messagesContainer.appendChild(msg);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;
            userInput.value = '';

            addMessage(query, 'user');
            addTypingIndicator();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        session_id: sessionId,
                        user_id: 'user_1' // Default for now, can be dynamic
                    }),
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Server error');
                }

                removeTypingIndicator();
                const botBubble = addMessage('', 'bot');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    botBubble.textContent = fullText;
                    scrollToBottom();
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('Sorry, something went wrong: ' + error.message, 'bot');
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>

</html>
